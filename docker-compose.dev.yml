
services:
  postgres:
    image: postgres:16-alpine
    container_name: recall-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: recall_dev
      POSTGRES_USER: recall_user
      POSTGRES_PASSWORD: recall_pass_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recall_user -d recall_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: recall-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
